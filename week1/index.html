<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ToDoリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f0f2f5;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 60px 16px;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 26px;
      color: #1a1a2e;
      margin-bottom: 28px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4a90e2;
    }

    .input-row button {
      padding: 12px 20px;
      background-color: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background-color: #357abd;
    }

    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #task-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #f8f9fb;
      border-radius: 10px;
      padding: 14px 16px;
      transition: background-color 0.2s;
    }

    #task-list li:hover {
      background-color: #eef2f7;
    }

    .task-text {
      flex: 1;
      font-size: 15px;
      color: #333;
      cursor: pointer;
      user-select: none;
      word-break: break-all;
    }

    .task-text.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .delete-btn {
      margin-left: 12px;
      padding: 6px 12px;
      background-color: #ff5f5f;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background-color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background-color: #d94444;
    }

    .empty-message {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 20px 0;
    }

    .counter {
      text-align: right;
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }

    .counter span {
      font-weight: bold;
      color: #4a90e2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="タスクを入力...">
      <button onclick="addTask()">追加</button>
    </div>

    <p class="counter" id="counter"></p>
    <ul id="task-list"></ul>
  </div>

  <script>
    // タスクを管理する配列
    let tasks = [];

    // Enterキーでも追加できるようにする
    document.getElementById('task-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addTask();
    });

    function addTask() {
      const input = document.getElementById('task-input');
      const text = input.value.trim();
      if (!text) return;

      tasks.push({ text: text, done: false });
      input.value = '';
      input.focus();
      render();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      render();
    }

    function render() {
      const list = document.getElementById('task-list');
      const counter = document.getElementById('counter');
      list.innerHTML = '';

      const doneCount = tasks.filter(function (t) { return t.done; }).length;
      counter.innerHTML = tasks.length > 0
        ? '完了: <span>' + doneCount + ' / ' + tasks.length + '</span> 件'
        : '';

      if (tasks.length === 0) {
        list.innerHTML = '<p class="empty-message">タスクはありません</p>';
        return;
      }

      tasks.forEach(function (task, index) {
        const li = document.createElement('li');

        const span = document.createElement('span');
        span.className = 'task-text' + (task.done ? ' done' : '');
        span.textContent = task.text;
        span.onclick = function () { toggleTask(index); };

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '削除';
        btn.onclick = function () { deleteTask(index); };

        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    // 初期表示
    render();
  </script>
</body>
</html>
