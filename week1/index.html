<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ToDoリスト</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #f0f2f5;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 60px 16px;
      min-height: 100vh;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      padding: 40px;
      width: 100%;
      max-width: 480px;
      height: fit-content;
    }

    h1 {
      font-size: 26px;
      color: #1a1a2e;
      margin-bottom: 28px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .input-row input {
      flex: 1;
      min-width: 0;
      padding: 12px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4a90e2;
    }

    .input-row select {
      padding: 12px 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      background: #fff;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .input-row select:focus {
      border-color: #4a90e2;
    }

    .input-row input[type="date"] {
      padding: 12px 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      cursor: pointer;
    }

    .input-row input[type="date"]:focus {
      border-color: #4a90e2;
    }

    .input-row button {
      padding: 12px 20px;
      background-color: #4a90e2;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background-color: #357abd;
    }

    #task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #task-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #f8f9fb;
      border-radius: 10px;
      padding: 14px 16px;
      transition: background-color 0.2s;
      border-left: 5px solid #e0e0e0;
    }

    #task-list li:hover {
      background-color: #eef2f7;
    }

    #task-list li.priority-high {
      border-left-color: #e53935;
      background-color: #fff5f5;
    }

    #task-list li.priority-high:hover {
      background-color: #ffe8e8;
    }

    #task-list li.priority-medium {
      border-left-color: #f9a825;
      background-color: #fffde7;
    }

    #task-list li.priority-medium:hover {
      background-color: #fff8d0;
    }

    #task-list li.priority-low {
      border-left-color: #1e88e5;
      background-color: #f0f6ff;
    }

    #task-list li.priority-low:hover {
      background-color: #deeeff;
    }

    .priority-badge {
      font-size: 11px;
      font-weight: bold;
      padding: 2px 7px;
      border-radius: 4px;
      margin-right: 10px;
      flex-shrink: 0;
      color: #fff;
    }

    .priority-badge.high { background-color: #e53935; }
    .priority-badge.medium { background-color: #f9a825; color: #333; }
    .priority-badge.low { background-color: #1e88e5; }

    .task-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .task-text {
      font-size: 15px;
      color: #333;
      cursor: pointer;
      user-select: none;
      word-break: break-all;
    }

    .task-text.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .due-date {
      font-size: 12px;
      color: #999;
      margin-top: 3px;
    }

    #task-list li.overdue {
      background-color: #ffe0e0 !important;
    }

    #task-list li.overdue:hover {
      background-color: #ffd0d0 !important;
    }

    #task-list li.overdue .due-date {
      color: #c62828;
      font-weight: bold;
    }

    .delete-btn {
      margin-left: 12px;
      padding: 6px 12px;
      background-color: #ff5f5f;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background-color 0.2s;
      flex-shrink: 0;
    }

    .delete-btn:hover {
      background-color: #d94444;
    }

    .empty-message {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 20px 0;
    }

    .counter {
      text-align: right;
      font-size: 13px;
      color: #888;
      margin-bottom: 12px;
    }

    .counter span {
      font-weight: bold;
      color: #4a90e2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ToDoリスト</h1>

    <div class="input-row">
      <input type="text" id="task-input" placeholder="タスクを入力...">
      <select id="priority-select">
        <option value="high">高</option>
        <option value="medium" selected>中</option>
        <option value="low">低</option>
      </select>
      <input type="date" id="due-date-input">
      <button onclick="addTask()">追加</button>
    </div>

    <p class="counter" id="counter"></p>
    <ul id="task-list"></ul>
  </div>

  <script>
    // タスクを管理する配列
    let tasks = [];

    // Enterキーでも追加できるようにする
    document.getElementById('task-input').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') addTask();
    });

    function addTask() {
      const input = document.getElementById('task-input');
      const prioritySelect = document.getElementById('priority-select');
      const dueDateInput = document.getElementById('due-date-input');
      const text = input.value.trim();
      if (!text) return;

      tasks.push({ text: text, done: false, priority: prioritySelect.value, dueDate: dueDateInput.value || null });
      input.value = '';
      dueDateInput.value = '';
      input.focus();
      render();
    }

    function toggleTask(index) {
      tasks[index].done = !tasks[index].done;
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      render();
    }

    function render() {
      const list = document.getElementById('task-list');
      const counter = document.getElementById('counter');
      list.innerHTML = '';

      const doneCount = tasks.filter(function (t) { return t.done; }).length;
      counter.innerHTML = tasks.length > 0
        ? '完了: <span>' + doneCount + ' / ' + tasks.length + '</span> 件'
        : '';

      if (tasks.length === 0) {
        list.innerHTML = '<p class="empty-message">タスクはありません</p>';
        return;
      }

      const priorityLabel = { high: '高', medium: '中', low: '低' };
      const today = new Date().toISOString().split('T')[0];

      tasks.forEach(function (task, index) {
        const isOverdue = task.dueDate && task.dueDate < today && !task.done;

        const li = document.createElement('li');
        li.className = 'priority-' + (task.priority || 'medium') + (isOverdue ? ' overdue' : '');

        const badge = document.createElement('span');
        badge.className = 'priority-badge ' + (task.priority || 'medium');
        badge.textContent = priorityLabel[task.priority] || '中';

        const taskInfo = document.createElement('div');
        taskInfo.className = 'task-info';

        const span = document.createElement('span');
        span.className = 'task-text' + (task.done ? ' done' : '');
        span.textContent = task.text;
        span.onclick = function () { toggleTask(index); };

        taskInfo.appendChild(span);

        if (task.dueDate) {
          const dateSpan = document.createElement('span');
          dateSpan.className = 'due-date';
          const formatted = task.dueDate.replace(/(\d{4})-(\d{2})-(\d{2})/, '$1/$2/$3');
          dateSpan.textContent = (isOverdue ? '⚠ 期限切れ: ' : '期限: ') + formatted;
          taskInfo.appendChild(dateSpan);
        }

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '削除';
        btn.onclick = function () { deleteTask(index); };

        li.appendChild(badge);
        li.appendChild(taskInfo);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    // 初期表示
    render();
  </script>
</body>
</html>
