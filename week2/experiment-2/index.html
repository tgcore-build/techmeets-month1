<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Helvetica Neue', Arial, sans-serif;
    }

    .card {
      width: 400px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      padding: 40px 32px;
      text-align: center;
    }

    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto 20px;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      color: #222;
      margin: 0 0 8px;
    }

    .comment {
      font-size: 14px;
      color: #666;
      margin: 0 0 24px;
      line-height: 1.6;
    }

    .skills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }

    .badge {
      background: #eeecff;
      color: #5548d9;
      font-size: 13px;
      font-weight: 500;
      padding: 5px 12px;
      border-radius: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="avatar" src="https://placehold.jp/100x100.png" alt="アイコン">
    <p class="name">Togo</p>
    <p class="comment">コードで課題を解決することが好きです。</p>
    <div class="skills">
      <span class="badge">JavaScript</span>
      <span class="badge">TypeScript</span>
      <span class="badge">React</span>
      <span class="badge">Node.js</span>
      <span class="badge">Python</span>
      <span class="badge">CSS</span>
    </div>
  </div>
</body>
</html>
